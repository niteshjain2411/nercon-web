server.port=8080
server.servlet.context-path=/nercon
spring.application.name=NERCON 2026 Registration System

# Logging
logging.level.root=INFO
logging.level.org.example=DEBUG
logging.file.name=logs/nercon.log

# File upload settings
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# View resolver configuration
spring.mvc.view.prefix=/
spring.mvc.view.suffix=.html
spring.resources.static-locations=classpath:/
spring.web.resources.static-locations=classpath:/

# Enable static content serving
spring.web.resources.add-mappings=true

# Firebase configuration
# Path to the Firebase service account key JSON file (download from Firebase Console > Project Settings > Service Accounts)
firebase.credentials.path=service-account.json
# Firebase Storage bucket name (e.g. your-project-id.appspot.com)
firebase.storage.bucket=quesbank-61190.firebasestorage.app

